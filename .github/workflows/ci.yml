name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests (zero deps)
        run: python tests/test_braincheck.py
      - name: Self-check the example fixtures
        run: python braincheck.py stats --schema tests/fixtures/schema.yaml --root tests/fixtures/vault
